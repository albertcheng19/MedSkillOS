# Circos Configuration
# Generated by Circos Plot Generator
# Title: Circos Plot

# Image settings
<image>
<<include etc/image.conf>>
dir   = .
file  = circos.png
png   = yes
svg   = yes
width = 800
height = 800
</image>

# Karyotype (chromosome definitions)
<<include etc/colors_fonts_patterns.conf>>
<<include etc/housekeeping.conf>>


<ideogram>
<spacing>
default = 0.005r
</spacing>

thickness        = 25p
stroke_thickness = 2
stroke_color     = black
fill             = yes
fill_color       = black

show_label       = yes
label_font       = default
label_radius     = dims(ideogram,radius) + 0.075r
label_size       = 30p
label_parallel   = yes

show_bands            = yes
fill_bands            = yes
band_stroke_thickness = 2
band_stroke_color     = white
</ideogram>


<ticks>
radius           = 1r
color            = black
thickness        = 2p

multiplier       = 1e-6
format           = %d

<tick>
spacing        = 5u
size           = 10p
show_label     = yes
label_size     = 15p
label_offset   = 5p
format         = %d
</tick>

<tick>
spacing        = 25u
size           = 15p
show_label     = yes
label_size     = 20p
label_offset   = 5p
format         = %d
</tick>
</ticks>

<colors>
color0 = red
color1 = blue
color2 = green
color3 = orange
color4 = purple
color5 = cyan
</colors>



# Karyotype
karyotype = data\karyotype.txt
