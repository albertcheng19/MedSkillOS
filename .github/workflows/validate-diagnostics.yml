name: validate-diagnostics

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Self test red flag detector
        run: python domains/diagnostics/skills/dx-red-flag-detector/scripts/self_test.py
      - name: Build exports
        run: python scripts/build_skill_exports.py
