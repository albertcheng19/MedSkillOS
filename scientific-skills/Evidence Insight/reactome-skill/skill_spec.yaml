name: reactome-skill
description: |
  The Reactome Database skill allows querying the Reactome REST API for systems biology research. 
  It provides access to curated pathway data, molecular interactions, and tools for overrepresentation and expression analysis.
version: 1.0.0
author: K-Dense Inc.

io_contract:
  inputs:
    - name: action
      type: string
      description: The action to perform (query_content, analyze_identifiers)
      required: true
    - name: query_id
      type: string
      description: Reactome ID for content query (e.g., R-HSA-69278)
      required: false
    - name: identifiers
      type: string
      description: List of gene identifiers for analysis (newline separated or comma separated)
      required: false
  outputs:
    - name: result
      type: object
      description: JSON response from the API

workflow_summary: |
  1. Content Service: Read-only access to pathways/entities.
  2. Analysis Service: Processes gene lists for enrichment.

deterministic_ops:
  - type: script
    path: scripts/reactome_tool.py
    description: Python script handling API requests

packaging_plan:
  - SKILL.md
  - scripts/reactome_tool.py
  - references/api_reference.md
  - risk03.md
