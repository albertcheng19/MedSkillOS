name: uspto-database
version: 0.1.0
description: Access United States Patent and Trademark Office data.
author: K-Dense Inc.
source_type: documentation
inputs:
  query:
    type: string
    description: Search keywords or query object
  search_target:
    type: string
    enum: [patents, trademarks, assignments]
    default: patents
outputs:
  data:
    type: object
    description: Search results or status info
scripts:
  - scripts/patent_search.py
  - scripts/peds_client.py
